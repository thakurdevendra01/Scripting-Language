<!-- Write a script to declare three variables for: Name, ExternalMarks and InternalMarks. print hello
[Name], your total marks is [sum] using console.log() -->
<html>
    <head><title>Lab 1 Three Variables</title></head>
    <body>
        <script type="text/javascript">
            var Name = "Devendra Kumar Thakur";
            var InternalMarks = 40;
            var ExternalMarks = 60;

            var sum = InternalMarks + ExternalMarks;

            console.log("Hello " +Name +", your total marks is " +sum);
        </script>
    </body>
</html>
