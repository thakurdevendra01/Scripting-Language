 Name: |    | -> can contain a-z, A-Z and space

 |Register| -->


 <html>
    <head><title>Registration Form</title>
        <script src="Lab4.js">

        </script>
    </head>
    <body>
        <form action="" onsubmit="return validateform()" name="myform" method="post">

            <h1>Registration Form</h1>

            <label for="name">Name:</label>
