<html>
    <head><title>Function Confirm</title>
    
    <script type="text/javascript">
        function show_confirm(){
            var r = confirm("Do you want to save?");
            if(r == true){
                document.write("Saved Successfully!");
            }
            else{
                document.write("Saved Failed!");
            }
        }
    </script>
    </head>
    <body>
        <input type="button" onclick="show_confirm()" value="Click">
    </body>
</html>
