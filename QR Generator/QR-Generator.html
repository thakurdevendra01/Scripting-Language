<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>

    <!-- QRCode.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,.15);
            width: 350px;
            text-align: center;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            background: #0078ff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
            margin: 5px;
        }

        button:hover {
            background: #005fd1;
        }

        #qrcode {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        #qrText {
            margin-top: 10px;
            font-weight: bold;
            color: #333;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>QR Code Generator</h2>

    <textarea id="data" rows="4" placeholder="Enter URL, text, phone number, email..."></textarea>

    <button onclick="generateQR()">Generate QR</button>
    <button id="downloadBtn" style="display:none;">Download QR</button>

    <div id="qrcode"></div>
    <div id="qrText">Scan QR code to get details</div>
</div>

<script>
let qr;

function generateQR() {
    const data = document.getElementById("data").value.trim();
    const qrContainer = document.getElementById("qrcode");
    const downloadBtn = document.getElementById("downloadBtn");
    const qrText = document.getElementById("qrText");

    qrContainer.innerHTML = "";
    qrText.style.display = "none";

    if (!data) {
        alert("Please enter something.");
        return;
    }

    qr = new QRCode(qrContainer, {
        text: data,
        width: 250,
        height: 250,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });

    qrText.style.display = "block";
    downloadBtn.style.display = "inline-block";
}

document.getElementById("downloadBtn").addEventListener("click", function() {
    const qrCanvas = document.querySelector("#qrcode canvas");
    if (qrCanvas) {
        // Create a new canvas to merge QR + text
        const finalCanvas = document.createElement("canvas");
        const ctx = finalCanvas.getContext("2d");

        // Set canvas size (QR height + extra space for text)
        finalCanvas.width = qrCanvas.width;
        finalCanvas.height = qrCanvas.height + 40;

        // Draw QR code
        ctx.drawImage(qrCanvas, 0, 0);

        // Add text below QR
        ctx.font = "16px Arial";
        ctx.fillStyle = "#000";
        ctx.textAlign = "center";
        ctx.fillText("Scan QR code to get details", finalCanvas.width / 2, qrCanvas.height + 25);

        // Download merged image
        const link = document.createElement("a");
        link.download = "qrcode_with_text.jpg";
        link.href = finalCanvas.toDataURL("image/jpg");
        link.click();
    } else {
        alert("Please generate a QR code first.");
    }
});
</script>

</body>
</html>
